name: Notify downstreams

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fluxzero-site:
    runs-on: ubuntu-latest
    steps:
      - name: Create fluxzero-site app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.SITE_BUILD_DISPATCHER_APP_ID }}
          private-key: ${{ secrets.SITE_BUILD_DISPATCHER_PRIVATE_KEY }}
          owner: fluxzero-io
          repositories: fluxzero-site
          permission-contents: write

      - name: Notify fluxzero-site
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'fluxzero-io',
              repo: 'fluxzero-site',
              event_type: 'fluxzero-sdk-updated',
              client_payload: {
                sdk_repository: `${context.repo.owner}/${context.repo.repo}`,
                sdk_ref: context.ref,
                sdk_before: context.payload.before || '',
                sdk_sha: context.sha,
                before: context.payload.before || '',
                after: context.sha,
              },
            });
