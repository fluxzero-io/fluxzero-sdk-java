name: Deploy

on:
  push:
    branches: [ main ]
    tags-ignore:
      - "[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      version:
        description: "Version e.g. 1.0.1 (leave empty to auto-bump)"
        required: false
        default: ""

concurrency:
  group: deploy-main
  cancel-in-progress: false

env:
  BUILD_ENVIRONMENT: github

jobs:
  # Job 1: Build and test (must succeed before anything else)
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      packages: write
    outputs:
      version: ${{ steps.tag_version.outputs.new_version }}
      version-tag: ${{ steps.tag_version.outputs.new_tag }}
      version-changelog: ${{ steps.release_notes.outputs.body }}
      maven-build-outcome: ${{ steps.maven-build.outcome }}
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install Java and Maven
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Find existing release tag
        id: existing_tag
        run: |
          tag=$(git tag --points-at "$GITHUB_SHA" --sort=-version:refname \
            | awk '/^[0-9]+\.[0-9]+\.[0-9]+([.-].*)?$/ { print; exit }')
          previous_tag=""
          if [ -n "$tag" ]; then
            previous_tag=$(git tag --merged "$GITHUB_SHA" --sort=-version:refname \
              | awk -v current="$tag" \
                '/^[0-9]+\.[0-9]+\.[0-9]+([.-].*)?$/ && $0 != current { print; exit }')
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "previous_tag=$previous_tag" >> "$GITHUB_OUTPUT"

      - name: Calculate release version
        uses: mathieudutour/github-tag-action@v6.2
        id: tag_version
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: minor
          tag_prefix: ""
          custom_tag: ${{ steps.existing_tag.outputs.tag || github.event.inputs.version }}
          fetch_all_tags: true
          custom_release_rules: "deps:patch:Dependency updates"
          dry_run: true

      - name: Generate release notes
        id: release_notes
        run: node .github/scripts/generate-release-notes.mjs
        env:
          RELEASE_VERSION: ${{ steps.tag_version.outputs.new_version }}
          RELEASE_TAG: ${{ steps.tag_version.outputs.new_tag }}
          PREVIOUS_TAG: ${{ steps.existing_tag.outputs.previous_tag || steps.tag_version.outputs.previous_tag }}
          CURRENT_REF: ${{ github.sha }}
          CUSTOM_RELEASE_RULES: "deps:patch:Dependency updates"

      - name: Set maven version
        run: |
          ./mvnw -B versions:set -DnewVersion=${{ steps.tag_version.outputs.new_tag }} -DprocessAllModules=true

      - uses: sigstore/cosign-installer@v4.1.2

      - name: Verify package base image signature
        run: |
          base_image=$(./mvnw -q -N help:evaluate \
            -Dexpression=fluxzero.package.base-image \
            -DforceStdout)
          cosign verify \
            --certificate-identity keyless@distroless.iam.gserviceaccount.com \
            --certificate-oidc-issuer https://accounts.google.com \
            "$base_image"

      - name: Test Maven Central publication recovery
        run: bash .github/scripts/recover-central-publication.test.sh

      - name: Build and test
        id: maven-build
        run: ./mvnw -Dgpg.skip -DskipPublishing=true -B install -P deploy

      - name: Reserve release tag
        env:
          RELEASE_TAG: ${{ steps.tag_version.outputs.new_tag }}
          RELEASE_SHA: ${{ github.sha }}
        run: |
          if [ -z "$RELEASE_TAG" ]; then
            echo "No release tag was calculated" >&2
            exit 1
          fi

          git fetch origin --force --tags
          tag_ref="refs/tags/$RELEASE_TAG"
          if git show-ref --verify --quiet "$tag_ref"; then
            tagged_sha=$(git rev-list -n 1 "$tag_ref")
            if [ "$tagged_sha" != "$RELEASE_SHA" ]; then
              echo "Tag $RELEASE_TAG already points to $tagged_sha instead of $RELEASE_SHA" >&2
              exit 1
            fi
            echo "Reusing existing tag $RELEASE_TAG on $RELEASE_SHA"
          else
            git tag "$RELEASE_TAG" "$RELEASE_SHA"
            git push origin "$tag_ref"
          fi

      - name: Publish multi-platform package images
        env:
          FLUXZERO_PACKAGE_VERSION: ${{ steps.tag_version.outputs.new_tag }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./mvnw -B fluxzero:publish-package

      - name: Create project files zips
        run: |
          mkdir -p target
          cd project-files
          zip -r ../target/project-java.zip java
          zip -r ../target/project-kotlin.zip kotlin

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: maven-artifacts
          path: |
            **/target/*.jar
            !**/target/*-sources.jar
            !**/target/*-javadoc.jar
          retention-days: 1

      - name: Upload project files
        uses: actions/upload-artifact@v7
        with:
          name: project-files
          path: |
            target/project-java.zip
            target/project-kotlin.zip
          retention-days: 1

  repair-main-ci:
    name: Repair failed main build
    needs: build-and-test
    if: ${{ always() && github.ref == 'refs/heads/main' && needs.build-and-test.result == 'failure' && needs.build-and-test.outputs.maven-build-outcome != 'success' }}
    uses: ./.github/workflows/repair-main-ci.yml
    permissions:
      actions: read
      contents: write
      issues: write
      pull-requests: write
    secrets: inherit
    with:
      run_id: ${{ github.run_id }}
      run_url: ${{ format('{0}/{1}/actions/runs/{2}', github.server_url, github.repository, github.run_id) }}
      head_sha: ${{ github.sha }}
      head_branch: main

  # Job 2: Deploy to Maven Central (runs in parallel after tagging and image publication)
  maven-central:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v7

      - name: Install Java and Maven
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: maven-artifacts

      # setting versions again as we checked out the sources clean in this step
      # the artifacts only contain the built jars
      - name: Set maven version
        run: |
          ./mvnw -B versions:set -DnewVersion=${{ needs.build-and-test.outputs.version-tag }} -DprocessAllModules=true

      - name: Deploy to Maven Central
        shell: bash
        run: |
          deployment_log="$(mktemp)"
          trap 'rm -f "$deployment_log"' EXIT

          maven_arguments=(-P deploy -B deploy -DskipTests)
          if [ "$GITHUB_RUN_ATTEMPT" -gt 1 ]; then
            # A previous attempt may have completed the immutable publication
            # after losing its final status response.
            maven_arguments+=(-DignorePublishedComponents=true)
          fi

          set +e
          ./mvnw "${maven_arguments[@]}" 2>&1 | tee "$deployment_log"
          pipeline_status=("${PIPESTATUS[@]}")
          set -e

          maven_status="${pipeline_status[0]}"
          tee_status="${pipeline_status[1]}"

          if [ "$maven_status" -eq 0 ]; then
            exit "$tee_status"
          fi
          if [ "$tee_status" -ne 0 ]; then
            exit "$tee_status"
          fi

          # Uploading the same immutable version again is unsafe. Resume polling
          # the deployment that Maven already uploaded instead.
          bash .github/scripts/recover-central-publication.sh "$deployment_log"
        env:
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          MAVEN_GPG_KEY: ${{ secrets.OSSRH_SIGNING_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.OSSRH_SIGNING_PASSPHRASE }}

  # Job 3: Generate and publish javadoc (runs in parallel after tagging)
  javadoc:
    needs: build-and-test
    uses: ./.github/workflows/javadoc.yml
    with:
      version: ${{ needs.build-and-test.outputs.version-tag }}

  # Job 4: Create GitHub release (runs in parallel after tagging)
  github-release:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v7

      - name: Download project files
        uses: actions/download-artifact@v8
        with:
          name: project-files
          path: release-assets

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.build-and-test.outputs.version-tag }}
          name: Fluxzero ${{ needs.build-and-test.outputs.version }}
          body: ${{ needs.build-and-test.outputs.version-changelog }}
          files: |
            release-assets/project-java.zip
            release-assets/project-kotlin.zip

  # Job 5: Notify fluxzero-site after the SDK release is tagged
  fluxzero-site:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Create fluxzero-site app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.SITE_BUILD_DISPATCHER_APP_ID }}
          private-key: ${{ secrets.SITE_BUILD_DISPATCHER_PRIVATE_KEY }}
          owner: fluxzero-io
          repositories: fluxzero-site
          permission-contents: write

      - name: Notify fluxzero-site
        uses: actions/github-script@v9
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'fluxzero-io',
              repo: 'fluxzero-site',
              event_type: 'fluxzero-sdk-updated',
              client_payload: {
                sdk_repository: `${context.repo.owner}/${context.repo.repo}`,
                sdk_ref: context.ref,
                sdk_before: context.payload.before || '',
                sdk_sha: context.sha,
                sdk_version: '${{ needs.build-and-test.outputs.version-tag }}',
                before: context.payload.before || '',
                after: context.sha,
              },
            });
