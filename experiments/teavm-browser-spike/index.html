<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>TeaVM Browser Compiler Spike</title>
        <style>
            :root {
                color-scheme: light;
                font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                background: #f4f0e8;
                color: #1b1f26;
            }

            body {
                margin: 0;
            }

            main {
                display: grid;
                grid-template-columns: minmax(0, 1.1fr) minmax(320px, 0.9fr);
                gap: 20px;
                min-height: 100vh;
                padding: 24px;
                box-sizing: border-box;
            }

            section {
                min-width: 0;
            }

            h1 {
                margin: 0 0 16px;
                font-size: 28px;
                line-height: 1.15;
                letter-spacing: 0;
            }

            h2 {
                margin: 0 0 10px;
                font-size: 15px;
                letter-spacing: 0;
            }

            textarea,
            pre {
                box-sizing: border-box;
                width: 100%;
                border: 1px solid #c8c1b5;
                border-radius: 8px;
                background: #fffdf8;
                color: #15171b;
                font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
            }

            textarea {
                min-height: calc(100vh - 160px);
                padding: 16px;
                resize: vertical;
                tab-size: 4;
            }

            pre {
                min-height: 92px;
                margin: 0 0 18px;
                padding: 14px;
                overflow: auto;
                white-space: pre-wrap;
            }

            .toolbar {
                display: flex;
                align-items: center;
                gap: 10px;
                margin-bottom: 14px;
            }

            button {
                border: 1px solid #1b1f26;
                border-radius: 8px;
                padding: 9px 14px;
                background: #1b1f26;
                color: #ffffff;
                font: inherit;
                cursor: pointer;
            }

            button.secondary {
                background: transparent;
                color: #1b1f26;
            }

            button:disabled {
                cursor: progress;
                opacity: 0.6;
            }

            #status {
                margin-left: auto;
                font-size: 13px;
                color: #5b4b3b;
            }

            table {
                width: 100%;
                border-collapse: collapse;
                margin-bottom: 18px;
                font-size: 14px;
            }

            th,
            td {
                border-bottom: 1px solid #d8d0c3;
                padding: 8px 0;
                text-align: left;
            }

            th {
                font-weight: 600;
                color: #52473e;
            }

            td {
                text-align: right;
            }

            @media (max-width: 860px) {
                main {
                    grid-template-columns: 1fr;
                    padding: 16px;
                }

                textarea {
                    min-height: 46vh;
                }

                #status {
                    margin-left: 0;
                }

                .toolbar {
                    align-items: flex-start;
                    flex-wrap: wrap;
                }
            }
        </style>
    </head>
    <body>
        <main>
            <section>
                <h1>TeaVM Browser Compiler Spike</h1>
                <div class="toolbar">
                    <button id="compile">Compile and run</button>
                    <button id="reset" class="secondary">Reset</button>
                    <span id="status">Ready</span>
                </div>
                <textarea id="source" spellcheck="false"></textarea>
            </section>
            <section>
                <h2>Timings</h2>
                <table>
                    <tbody id="timings"></tbody>
                </table>
                <h2>Output</h2>
                <pre id="output"></pre>
                <h2>Diagnostics</h2>
                <pre id="diagnostics"></pre>
            </section>
        </main>
        <script type="module" src="./app.js"></script>
    </body>
</html>
